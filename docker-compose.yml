# Clúster Apache Spark standalone: 1 master + 2 workers + 1 driver (notebooks).
# Todos los servicios comparten la MISMA imagen (spark-lab) => Spark y Python
# idénticos en driver y executors (evita el clásico error de versión de Python).
#
# IMPORTANTE: los CUATRO servicios llevan "build: ." con el mismo "image:".
# Así Docker construye la imagen una vez y el resto la reutiliza de caché.
# Si solo un servicio tuviera "build:", Codespaces intentaría DESCARGAR
# spark-lab:latest de Docker Hub (no existe) y la creación fallaría
# -> VS Code arrancaría en "modo recuperación" con /workspace vacío.

services:
  spark-master:
    build: .
    image: spark-lab:latest
    container_name: spark-master
    hostname: spark-master
    entrypoint: ["/opt/spark/bin/spark-class"]
    command: ["org.apache.spark.deploy.master.Master", "--host", "spark-master"]
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # RPC master<->workers / driver
    networks:
      - spark-net

  spark-worker-1:
    build: .
    image: spark-lab:latest
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    entrypoint: ["/opt/spark/bin/spark-class"]
    command:
      - "org.apache.spark.deploy.worker.Worker"
      - "spark://spark-master:7077"
      - "--cores"
      - "1"
      - "--memory"
      - "1500m"
    ports:
      - "8081:8081"   # Worker 1 Web UI
    networks:
      - spark-net

  spark-worker-2:
    build: .
    image: spark-lab:latest
    container_name: spark-worker-2
    hostname: spark-worker-2
    depends_on:
      - spark-master
    entrypoint: ["/opt/spark/bin/spark-class"]
    command:
      - "org.apache.spark.deploy.worker.Worker"
      - "spark://spark-master:7077"
      - "--cores"
      - "1"
      - "--memory"
      - "1500m"
    ports:
      - "8082:8081"   # Worker 2 Web UI
    networks:
      - spark-net

  # Contenedor al que se conecta VS Code. Aquí corren los notebooks (= driver Spark).
  spark-driver:
    build: .
    image: spark-lab:latest
    container_name: spark-driver
    hostname: spark-driver
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
    # No arrancamos Spark aquí: solo mantenemos vivo el contenedor.
    entrypoint: ["/bin/bash"]
    command: ["-c", "sleep infinity"]
    volumes:
      - .:/workspace:cached
    working_dir: /workspace
    ports:
      - "4040:4040"   # Spark Application UI (aparece al lanzar un job)
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge

